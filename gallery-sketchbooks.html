<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sketchbooks — Yash</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --black:    #000000;
    --white:    #F5F5F0;
    --grey-1:   #111111;
    --grey-3:   #444444;
    --grey-4:   #888888;
    --silver:   #C8C8C8;
    --border:   rgba(200,200,200,0.15);
    --display:  'Cormorant Garamond', Georgia, serif;
    --body:     'Inter', -apple-system, sans-serif;
    --ease:     cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; }
  body {
    background: var(--black); color: var(--white);
    font-family: var(--body); font-weight: 300; line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  img { display: block; width: 100%; object-fit: cover; }
  a { color: inherit; text-decoration: none; }
  ::-webkit-scrollbar { width: 2px; }
  ::-webkit-scrollbar-track { background: var(--black); }
  ::-webkit-scrollbar-thumb { background: var(--grey-3); }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 28px 48px; border-bottom: 1px solid var(--border);
  }
  .back-link {
    font-size: 0.65rem; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--grey-4); transition: color 0.3s;
  }
  .back-link:hover { color: var(--white); }
  .header-logo {
    font-family: var(--display); font-size: 1.2rem; letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  main { max-width: 1280px; margin: 0 auto; padding: 80px 48px 120px; }
  .page-eyebrow {
    font-size: 0.62rem; letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--grey-4); margin-bottom: 20px;
  }
  .page-title {
    font-family: var(--display); font-size: clamp(2.6rem, 5vw, 4.2rem);
    font-weight: 300; line-height: 1.05; margin-bottom: 60px;
  }
  .page-title em { font-style: italic; color: var(--silver); }

  .masonry { columns: 3; column-gap: 16px; }
  .masonry-item {
    break-inside: avoid; margin-bottom: 16px; overflow: hidden;
    position: relative; cursor: pointer;
  }
  .masonry-item img {
    width: 100%; filter: grayscale(100%) contrast(1.05);
    transition: transform 0.7s var(--ease), filter 0.5s;
  }
  .masonry-item:hover img { transform: scale(1.04); filter: grayscale(80%); }
  .item-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.82) 0%, transparent 60%);
    opacity: 0; transition: opacity 0.4s;
    display: flex; align-items: flex-end; padding: 18px;
  }
  .masonry-item:hover .item-overlay { opacity: 1; }
  .item-meta { font-size: 0.62rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--silver); }
  .sketch-meta-tag {
    font-size: 0.58rem; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--grey-4); display: block; margin-top: 2px;
  }

  .lightbox {
    position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.96);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.4s;
  }
  .lightbox.open { opacity: 1; pointer-events: all; }
  .lightbox img { max-width: 90vw; max-height: 88vh; object-fit: contain; filter: grayscale(100%); }
  .lightbox-close {
    position: absolute; top: 32px; right: 40px;
    font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--grey-4); cursor: pointer; background: none; border: none; font-family: var(--body);
  }
  .lightbox-close:hover { color: var(--white); }
  .lightbox-caption {
    position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
    font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--grey-4);
  }

  @media (max-width: 900px) {
    header { padding: 22px 28px; }
    main { padding: 60px 28px 90px; }
    .masonry { columns: 2; }
  }
  @media (max-width: 560px) {
    .masonry { columns: 1; }
  }
</style>
</head>
<body>

<header>
  <a href="index.html" class="back-link">← Back to site</a>
  <span class="header-logo">Yash</span>
</header>

<main>
  <p class="page-eyebrow">Sketchbooks</p>
  <h1 class="page-title">Thinking,<em>left visible.</em></h1>
  <div class="masonry" id="fullGrid"><!-- generated by JS below --></div>
</main>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightboxClose">✕ Close</button>
  <img src="" alt="" id="lightboxImg">
  <div class="lightbox-caption" id="lightboxCaption"></div>
</div>

<script>
/* ────────────────────────────────────────────────────────────
   NOTE FOR YASH: this is the full sketchbook set. It is
   separate from the smaller teaser array on the homepage
   (index.html) — update both if a spread should appear in
   both places. To add your own pages, replace the `src`
   values below with paths into the images/sketchbooks/
   folder (see the README.txt in there).
   ──────────────────────────────────────────────────────────── */
const sketchesFull = [
  { src:'https://images.unsplash.com/photo-1452860606245-08befc0ff44b?w=900&q=80', title:'Travel Journal, Page 14', loc:'Ink & pencil, 2023' },
  { src:'https://images.unsplash.com/photo-1455390582262-044cdead277a?w=800&q=80', title:'Hand Studies', loc:'Pencil, 2024' },
  { src:'https://images.unsplash.com/photo-1513364776144-60967b0f800f?w=900&q=80', title:'Set Design Notes', loc:'Ink, 2024' },
  { src:'https://images.unsplash.com/photo-1517842645767-c639042777db?w=800&q=80', title:'Margins from Varanasi', loc:'Pencil & wash, 2023' },
  { src:'https://images.unsplash.com/photo-1456086272160-b28b0645b729?w=900&q=80', title:'Costume Sketches', loc:'Pencil, 2024' },
  { src:'https://images.unsplash.com/photo-1518998053901-5348d3961a04?w=800&q=80', title:'Storyboard Fragment', loc:'Ink, 2022' },
  { src:'https://images.unsplash.com/photo-1455849318743-b2233052fcff?w=900&q=80', title:'Light Studies', loc:'Pencil, 2023' },
  { src:'https://images.unsplash.com/photo-1496769336843-ae79c64e4ff8?w=800&q=80', title:'Field Notes', loc:'Ink & pencil, 2024' },
];

const grid = document.getElementById('fullGrid');
sketchesFull.forEach(p => {
  const item = document.createElement('div');
  item.className = 'masonry-item';
  item.innerHTML = `
    <img src="${p.src}" alt="${p.title}" loading="lazy">
    <div class="item-overlay"><div class="item-meta">${p.title}<span class="sketch-meta-tag">${p.loc}</span></div></div>`;
  item.addEventListener('click', () => openLightbox(p.src, `${p.title} — ${p.loc}`));
  grid.appendChild(item);
});

const lb = document.getElementById('lightbox');
const lbImg = document.getElementById('lightboxImg');
const lbCap = document.getElementById('lightboxCaption');
function openLightbox(src, caption) {
  lbImg.src = src; lbCap.textContent = caption;
  lb.classList.add('open'); document.body.style.overflow = 'hidden';
}
document.getElementById('lightboxClose').addEventListener('click', () => {
  lb.classList.remove('open'); document.body.style.overflow = '';
});
lb.addEventListener('click', e => { if (e.target === lb) { lb.classList.remove('open'); document.body.style.overflow = ''; } });
document.addEventListener('keydown', e => { if (e.key === 'Escape') { lb.classList.remove('open'); document.body.style.overflow = ''; } });
</script>
</body>
</html>
