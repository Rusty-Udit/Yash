<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photography — Yash</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --black:    #000000;
    --white:    #F5F5F0;
    --grey-1:   #111111;
    --grey-3:   #444444;
    --grey-4:   #888888;
    --silver:   #C8C8C8;
    --border:   rgba(200,200,200,0.15);
    --display:  'Cormorant Garamond', Georgia, serif;
    --body:     'Inter', -apple-system, sans-serif;
    --ease:     cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; }
  body {
    background: var(--black); color: var(--white);
    font-family: var(--body); font-weight: 300; line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  img { display: block; width: 100%; object-fit: cover; }
  a { color: inherit; text-decoration: none; }
  ::-webkit-scrollbar { width: 2px; }
  ::-webkit-scrollbar-track { background: var(--black); }
  ::-webkit-scrollbar-thumb { background: var(--grey-3); }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 28px 48px; border-bottom: 1px solid var(--border);
  }
  .back-link {
    font-size: 0.65rem; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--grey-4); transition: color 0.3s;
  }
  .back-link:hover { color: var(--white); }
  .header-logo {
    font-family: var(--display); font-size: 1.2rem; letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  main { max-width: 1280px; margin: 0 auto; padding: 80px 48px 120px; }
  .page-eyebrow {
    font-size: 0.62rem; letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--grey-4); margin-bottom: 20px;
  }
  .page-title {
    font-family: var(--display); font-size: clamp(2.6rem, 5vw, 4.2rem);
    font-weight: 300; line-height: 1.05; margin-bottom: 60px;
  }
  .page-title em { font-style: italic; color: var(--silver); }

  .masonry { columns: 3; column-gap: 16px; }
  .masonry-item {
    break-inside: avoid; margin-bottom: 16px; overflow: hidden;
    position: relative; cursor: pointer;
  }
  .masonry-item img {
    width: 100%; filter: grayscale(100%) contrast(1.05);
    transition: transform 0.7s var(--ease), filter 0.5s;
  }
  .masonry-item:hover img { transform: scale(1.04); filter: grayscale(80%); }
  .item-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, transparent 55%);
    opacity: 0; transition: opacity 0.4s;
    display: flex; align-items: flex-end; padding: 18px;
  }
  .masonry-item:hover .item-overlay { opacity: 1; }
  .item-meta { font-size: 0.62rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--silver); }

  .lightbox {
    position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.96);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.4s;
  }
  .lightbox.open { opacity: 1; pointer-events: all; }
  .lightbox img { max-width: 90vw; max-height: 88vh; object-fit: contain; filter: grayscale(100%); }
  .lightbox-close {
    position: absolute; top: 32px; right: 40px;
    font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--grey-4); cursor: pointer; background: none; border: none; font-family: var(--body);
  }
  .lightbox-close:hover { color: var(--white); }
  .lightbox-caption {
    position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
    font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--grey-4);
  }

  @media (max-width: 900px) {
    header { padding: 22px 28px; }
    main { padding: 60px 28px 90px; }
    .masonry { columns: 2; }
  }
  @media (max-width: 560px) {
    .masonry { columns: 1; }
  }
</style>
</head>
<body>

<header>
  <a href="index.html" class="back-link">← Back to site</a>
  <span class="header-logo">Yash</span>
</header>

<main>
  <p class="page-eyebrow">Photography</p>
  <h1 class="page-title">What the eye<em>arrests.</em></h1>
  <div class="masonry" id="fullGrid"><!-- generated by JS below --></div>
</main>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightboxClose">✕ Close</button>
  <img src="" alt="" id="lightboxImg">
  <div class="lightbox-caption" id="lightboxCaption"></div>
</div>

<script>
/* ────────────────────────────────────────────────────────────
   NOTE FOR YASH: this array is the full photography set shown
   on this page. It is separate from the smaller teaser array
   on the homepage (index.html) — update both if you want a
   piece to appear in both places. To add your own photos,
   replace the `src` values below with paths into the
   images/photography/ folder (see the README.txt in there).
   ──────────────────────────────────────────────────────────── */
const photosFull = [
  { src:'https://images.unsplash.com/photo-1488590528505-98d2b5aba04b?w=900&q=80', title:'Circuitry', loc:'Mumbai, 2024' },
  { src:'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&q=80', title:'Altitude', loc:'Himalayas, 2023' },
  { src:'https://images.unsplash.com/photo-1493246507139-91e8fad9978e?w=900&q=80', title:'Geometry of Fog', loc:'Kerala, 2024' },
  { src:'https://images.unsplash.com/photo-1470252649378-9c29740c9fa8?w=800&q=80', title:'Golden Hour', loc:'Rajasthan, 2023' },
  { src:'https://images.unsplash.com/photo-1541698444083-023c97d3f4b6?w=900&q=80', title:'Solitude I', loc:'Varanasi, 2024' },
  { src:'https://images.unsplash.com/photo-1455849318743-b2233052fcff?w=800&q=80', title:'Morning Pulse', loc:'Delhi, 2022' },
  { src:'https://images.unsplash.com/photo-1509316785289-025f5b846b35?w=900&q=80', title:'Sand Study', loc:'Jaisalmer, 2023' },
  { src:'https://images.unsplash.com/photo-1501854140801-50d01698950b?w=800&q=80', title:'Aerial', loc:'Goa, 2024' },
  { src:'https://images.unsplash.com/photo-1475924156734-496f6cac6ec1?w=900&q=80', title:'Forest Light', loc:'Coorg, 2023' },
  { src:'https://images.unsplash.com/photo-1519985176271-adb1088fa94c?w=900&q=80', title:'Night Market', loc:'Bangkok, 2023' },
  { src:'https://images.unsplash.com/photo-1504711434969-e33886168f5c?w=800&q=80', title:'Lattice', loc:'Jaipur, 2024' },
  { src:'https://images.unsplash.com/photo-1473773508845-188df298d2d1?w=900&q=80', title:'Threshold Light', loc:'Udaipur, 2023' },
  { src:'https://images.unsplash.com/photo-1500534623283-312aade485b7?w=800&q=80', title:'Glass Study', loc:'Mumbai, 2022' },
  { src:'https://images.unsplash.com/photo-1465101162946-4377e57745c3?w=900&q=80', title:'Quiet Harbor', loc:'Kochi, 2024' },
  { src:'https://images.unsplash.com/photo-1490806843957-31f4c9a91c65?w=800&q=80', title:'Pause', loc:'Shimla, 2023' },
  { src:'https://images.unsplash.com/photo-1502790671504-542ad42d5189?w=900&q=80', title:'Stillwater', loc:'Srinagar, 2024' },
  { src:'https://images.unsplash.com/photo-1495805442109-bf1cf975750b?w=800&q=80', title:'Procession', loc:'Pushkar, 2023' },
  { src:'https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?w=900&q=80', title:'Open Field', loc:'Manali, 2022' },
];

const grid = document.getElementById('fullGrid');
photosFull.forEach(p => {
  const item = document.createElement('div');
  item.className = 'masonry-item';
  item.innerHTML = `
    <img src="${p.src}" alt="${p.title}" loading="lazy">
    <div class="item-overlay"><div class="item-meta">${p.title} &nbsp;·&nbsp; ${p.loc}</div></div>`;
  item.addEventListener('click', () => openLightbox(p.src, `${p.title} — ${p.loc}`));
  grid.appendChild(item);
});

const lb = document.getElementById('lightbox');
const lbImg = document.getElementById('lightboxImg');
const lbCap = document.getElementById('lightboxCaption');
function openLightbox(src, caption) {
  lbImg.src = src; lbCap.textContent = caption;
  lb.classList.add('open'); document.body.style.overflow = 'hidden';
}
document.getElementById('lightboxClose').addEventListener('click', () => {
  lb.classList.remove('open'); document.body.style.overflow = '';
});
lb.addEventListener('click', e => { if (e.target === lb) { lb.classList.remove('open'); document.body.style.overflow = ''; } });
document.addEventListener('keydown', e => { if (e.key === 'Escape') { lb.classList.remove('open'); document.body.style.overflow = ''; } });
</script>
</body>
</html>
