<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abstract Paintings — Yash</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --black:    #000000;
    --white:    #F5F5F0;
    --grey-1:   #111111;
    --grey-3:   #444444;
    --grey-4:   #888888;
    --silver:   #C8C8C8;
    --border:   rgba(200,200,200,0.15);
    --display:  'Cormorant Garamond', Georgia, serif;
    --body:     'Inter', -apple-system, sans-serif;
    --ease:     cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; }
  body {
    background: var(--black); color: var(--white);
    font-family: var(--body); font-weight: 300; line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  img { display: block; width: 100%; object-fit: cover; }
  a { color: inherit; text-decoration: none; }
  ::-webkit-scrollbar { width: 2px; }
  ::-webkit-scrollbar-track { background: var(--black); }
  ::-webkit-scrollbar-thumb { background: var(--grey-3); }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 28px 48px; border-bottom: 1px solid var(--border);
  }
  .back-link {
    font-size: 0.65rem; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--grey-4); transition: color 0.3s;
  }
  .back-link:hover { color: var(--white); }
  .header-logo {
    font-family: var(--display); font-size: 1.2rem; letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  main { max-width: 1280px; margin: 0 auto; padding: 80px 48px 120px; }
  .page-eyebrow {
    font-size: 0.62rem; letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--grey-4); margin-bottom: 20px;
  }
  .page-title {
    font-family: var(--display); font-size: clamp(2.6rem, 5vw, 4.2rem);
    font-weight: 300; line-height: 1.05; margin-bottom: 60px;
  }
  .page-title em { font-style: italic; color: var(--silver); }

  .paintings-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
  .painting-cell {
    position: relative; aspect-ratio: 4/3; overflow: hidden; cursor: pointer;
  }
  .painting-cell.tall { aspect-ratio: 3/4; grid-row: span 2; }
  .painting-cell img {
    width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%);
    transition: transform 0.8s var(--ease), filter 0.5s;
  }
  .painting-cell:hover img { transform: scale(1.06); filter: grayscale(40%); }
  .painting-info {
    position: absolute; bottom: 0; left: 0; right: 0; padding: 24px 20px 20px;
    background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
    transform: translateY(10px); opacity: 0; transition: all 0.4s var(--ease);
  }
  .painting-cell:hover .painting-info { transform: none; opacity: 1; }
  .painting-title { font-family: var(--display); font-size: 1.2rem; font-weight: 300; }
  .painting-year { font-size: 0.6rem; letter-spacing: 0.16em; color: var(--grey-4); margin-top: 4px; }

  .lightbox {
    position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.96);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.4s;
  }
  .lightbox.open { opacity: 1; pointer-events: all; }
  .lightbox img { max-width: 90vw; max-height: 88vh; object-fit: contain; filter: grayscale(100%); }
  .lightbox-close {
    position: absolute; top: 32px; right: 40px;
    font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--grey-4); cursor: pointer; background: none; border: none; font-family: var(--body);
  }
  .lightbox-close:hover { color: var(--white); }
  .lightbox-caption {
    position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
    font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--grey-4);
  }

  @media (max-width: 900px) {
    header { padding: 22px 28px; }
    main { padding: 60px 28px 90px; }
    .paintings-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 560px) {
    .paintings-grid { grid-template-columns: 1fr; }
    .painting-cell.tall { aspect-ratio: 4/3; grid-row: auto; }
  }
</style>
</head>
<body>

<header>
  <a href="index.html" class="back-link">← Back to site</a>
  <span class="header-logo">Yash</span>
</header>

<main>
  <p class="page-eyebrow">Abstract Paintings</p>
  <h1 class="page-title">What the camera<em>cannot hold.</em></h1>
  <div class="paintings-grid" id="fullGrid"><!-- generated by JS below --></div>
</main>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightboxClose">✕ Close</button>
  <img src="" alt="" id="lightboxImg">
  <div class="lightbox-caption" id="lightboxCaption"></div>
</div>

<script>
/* ────────────────────────────────────────────────────────────
   NOTE FOR YASH: this is the full paintings set. It is separate
   from the smaller teaser array on the homepage (index.html) —
   update both if a painting should appear in both places. To
   add your own work, replace the `src` values below with paths
   into the images/abstract-paintings/ folder (see the
   README.txt in there). Set tall:true for portrait-oriented
   pieces.
   ──────────────────────────────────────────────────────────── */
const paintingsFull = [
  { src:'https://images.unsplash.com/photo-1579783900882-c0d3dad7b119?w=900&q=80', title:'Dusk Study', year:'Oil on canvas, 2024', tall:true },
  { src:'https://images.unsplash.com/photo-1578321272176-b7bbc0679853?w=900&q=80', title:'Fragment I', year:'Acrylic, 2023', tall:false },
  { src:'https://images.unsplash.com/photo-1513364776144-60967b0f800f?w=900&q=80', title:'Interior', year:'Oil on board, 2024', tall:false },
  { src:'https://images.unsplash.com/photo-1547891654-e66ed7ebb968?w=900&q=80', title:'Cascade', year:'Mixed media, 2023', tall:false },
  { src:'https://images.unsplash.com/photo-1536924940846-227afb31e2a5?w=900&q=80', title:'Fragment II', year:'Acrylic, 2024', tall:false },
  { src:'https://images.unsplash.com/photo-1549887534-1541e9326642?w=900&q=80', title:'Weight of Color', year:'Oil on canvas, 2023', tall:true },
  { src:'https://images.unsplash.com/photo-1518998053901-5348d3961a04?w=900&q=80', title:'Static', year:'Mixed media, 2024', tall:false },
  { src:'https://images.unsplash.com/photo-1577720580479-7d839d829c73?w=900&q=80', title:'Erosion', year:'Oil on board, 2022', tall:false },
];

const grid = document.getElementById('fullGrid');
paintingsFull.forEach(p => {
  const cell = document.createElement('div');
  cell.className = 'painting-cell' + (p.tall ? ' tall' : '');
  cell.innerHTML = `
    <img src="${p.src}" alt="${p.title}" loading="lazy">
    <div class="painting-info">
      <div class="painting-title">${p.title}</div>
      <div class="painting-year">${p.year}</div>
    </div>`;
  cell.addEventListener('click', () => openLightbox(p.src, `${p.title} — ${p.year}`));
  grid.appendChild(cell);
});

const lb = document.getElementById('lightbox');
const lbImg = document.getElementById('lightboxImg');
const lbCap = document.getElementById('lightboxCaption');
function openLightbox(src, caption) {
  lbImg.src = src; lbCap.textContent = caption;
  lb.classList.add('open'); document.body.style.overflow = 'hidden';
}
document.getElementById('lightboxClose').addEventListener('click', () => {
  lb.classList.remove('open'); document.body.style.overflow = '';
});
lb.addEventListener('click', e => { if (e.target === lb) { lb.classList.remove('open'); document.body.style.overflow = ''; } });
document.addEventListener('keydown', e => { if (e.key === 'Escape') { lb.classList.remove('open'); document.body.style.overflow = ''; } });
</script>
</body>
</html>
