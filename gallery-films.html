<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Films — Yash</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --black:    #000000;
    --white:    #F5F5F0;
    --grey-1:   #111111;
    --grey-3:   #444444;
    --grey-4:   #888888;
    --silver:   #C8C8C8;
    --border:   rgba(200,200,200,0.15);
    --display:  'Cormorant Garamond', Georgia, serif;
    --body:     'Inter', -apple-system, sans-serif;
    --ease:     cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; }
  body {
    background: var(--black); color: var(--white);
    font-family: var(--body); font-weight: 300; line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  img { display: block; width: 100%; object-fit: cover; }
  a { color: inherit; text-decoration: none; }
  ::-webkit-scrollbar { width: 2px; }
  ::-webkit-scrollbar-track { background: var(--black); }
  ::-webkit-scrollbar-thumb { background: var(--grey-3); }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 28px 48px; border-bottom: 1px solid var(--border);
  }
  .back-link {
    font-size: 0.65rem; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--grey-4); transition: color 0.3s;
  }
  .back-link:hover { color: var(--white); }
  .header-logo {
    font-family: var(--display); font-size: 1.2rem; letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  main { max-width: 1280px; margin: 0 auto; padding: 80px 48px 120px; }
  .page-eyebrow {
    font-size: 0.62rem; letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--grey-4); margin-bottom: 20px;
  }
  .page-title {
    font-family: var(--display); font-size: clamp(2.6rem, 5vw, 4.2rem);
    font-weight: 300; line-height: 1.05; margin-bottom: 60px;
  }
  .page-title em { font-style: italic; color: var(--silver); }

  .films-list { display: flex; flex-direction: column; }
  .film-item {
    display: grid; grid-template-columns: 60px 1fr 1fr auto;
    align-items: center; gap: 32px;
    padding: 32px 0; border-bottom: 1px solid var(--border);
    cursor: pointer; transition: background 0.3s; position: relative;
  }
  .film-item::before {
    content: ''; position: absolute; left: -48px; right: -48px; top: 0; bottom: 0;
    background: var(--grey-1); opacity: 0; transition: opacity 0.3s; z-index: -1;
  }
  .film-item:hover::before { opacity: 1; }
  .film-num { font-family: var(--display); font-size: 1.1rem; color: var(--grey-3); font-weight: 300; }
  .film-thumb { width: 100%; aspect-ratio: 16/9; overflow: hidden; }
  .film-thumb img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%); transition: filter 0.4s; }
  .film-item:hover .film-thumb img { filter: grayscale(30%); }
  .film-title { font-family: var(--display); font-size: 1.5rem; font-weight: 300; margin-bottom: 6px; }
  .film-detail { font-size: 0.62rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--grey-4); }
  .film-duration { font-size: 0.7rem; letter-spacing: 0.1em; color: var(--grey-4); text-align: right; }
  .film-play {
    width: 44px; height: 44px; border: 1px solid var(--border); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.3s, background 0.3s; flex-shrink: 0;
  }
  .film-item:hover .film-play { border-color: var(--silver); background: rgba(200,200,200,0.1); }
  .film-play svg { fill: var(--white); margin-left: 3px; }

  @media (max-width: 900px) {
    header { padding: 22px 28px; }
    main { padding: 60px 28px 90px; }
    .film-item { grid-template-columns: 1fr auto; gap: 20px; }
    .film-num, .film-thumb, .film-duration { display: none; }
  }
</style>
</head>
<body>

<header>
  <a href="index.html" class="back-link">← Back to site</a>
  <span class="header-logo">Yash</span>
</header>

<main>
  <p class="page-eyebrow">Films</p>
  <h1 class="page-title">The space<em>between frames.</em></h1>
  <div class="films-list" id="fullList"><!-- generated by JS below --></div>
</main>

<script>
/* ────────────────────────────────────────────────────────────
   NOTE FOR YASH: this is the full filmography. It is separate
   from the smaller teaser array on the homepage (index.html) —
   update both if a film should appear in both places. To use
   your own thumbnails, replace the `thumb` values below with
   paths into the images/films/ folder (see the README.txt in
   there). This page shows thumbnails and details only — it
   does not embed video. If you want each entry to open an
   actual film, add a `url` field to the object below and
   change the click handler near the bottom of this script to
   window.open(f.url, '_blank').
   ──────────────────────────────────────────────────────────── */
const filmsFull = [
  { num:'01', thumb:'https://images.unsplash.com/photo-1485846234645-a62644f84728?w=500&q=80', title:'The Salt Flat', genre:'Short narrative · 16 min', year:'2024', duration:'16:22' },
  { num:'02', thumb:'https://images.unsplash.com/photo-1440404653325-ab127d49abc1?w=500&q=80', title:'Beneath the Noise', genre:'Documentary · 22 min', year:'2023', duration:'22:07' },
  { num:'03', thumb:'https://images.unsplash.com/photo-1478720568477-152d9b164e26?w=500&q=80', title:'Corridor', genre:'Experimental · 8 min', year:'2024', duration:'08:45' },
  { num:'04', thumb:'https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=500&q=80', title:'Of Mothers and Mountains', genre:'Documentary · 34 min', year:'2022', duration:'34:18' },
  { num:'05', thumb:'https://images.unsplash.com/photo-1485846234645-a62644f84728?w=500&q=80', title:'Still Life, Moving', genre:'Experimental · 6 min', year:'2023', duration:'06:14' },
  { num:'06', thumb:'https://images.unsplash.com/photo-1440404653325-ab127d49abc1?w=500&q=80', title:'Harbor Light', genre:'Short narrative · 12 min', year:'2022', duration:'12:51' },
];

const list = document.getElementById('fullList');
filmsFull.forEach(f => {
  const item = document.createElement('div');
  item.className = 'film-item';
  item.innerHTML = `
    <div class="film-num">${f.num}</div>
    <div class="film-thumb"><img src="${f.thumb}" alt="${f.title}" loading="lazy"></div>
    <div class="film-info">
      <div class="film-title">${f.title}</div>
      <div class="film-detail">${f.genre} &nbsp;·&nbsp; ${f.year}</div>
    </div>
    <div class="film-duration">${f.duration}</div>
    <div class="film-play"><svg width="12" height="14" viewBox="0 0 12 14"><path d="M0 0l12 7L0 14V0z"/></svg></div>`;
  // f.url could be opened here once you add real film links, e.g.:
  // item.addEventListener('click', () => f.url && window.open(f.url, '_blank'));
  list.appendChild(item);
});
</script>
</body>
</html>
