<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visual Narratives — Yash</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --black:    #000000;
    --white:    #F5F5F0;
    --grey-1:   #111111;
    --grey-3:   #444444;
    --grey-4:   #888888;
    --silver:   #C8C8C8;
    --border:   rgba(200,200,200,0.15);
    --display:  'Cormorant Garamond', Georgia, serif;
    --body:     'Inter', -apple-system, sans-serif;
    --ease:     cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; }
  body {
    background: var(--black); color: var(--white);
    font-family: var(--body); font-weight: 300; line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  img { display: block; width: 100%; object-fit: cover; }
  a { color: inherit; text-decoration: none; }
  ::-webkit-scrollbar { width: 2px; }
  ::-webkit-scrollbar-track { background: var(--black); }
  ::-webkit-scrollbar-thumb { background: var(--grey-3); }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 28px 48px; border-bottom: 1px solid var(--border);
  }
  .back-link {
    font-size: 0.65rem; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--grey-4); transition: color 0.3s;
  }
  .back-link:hover { color: var(--white); }
  .header-logo {
    font-family: var(--display); font-size: 1.2rem; letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  main { max-width: 1280px; margin: 0 auto; padding: 80px 48px 120px; }
  .page-eyebrow {
    font-size: 0.62rem; letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--grey-4); margin-bottom: 20px;
  }
  .page-title {
    font-family: var(--display); font-size: clamp(2.6rem, 5vw, 4.2rem);
    font-weight: 300; line-height: 1.05; margin-bottom: 60px;
  }
  .page-title em { font-style: italic; color: var(--silver); }

  .narrative-list { display: flex; flex-direction: column; }
  .narrative-item {
    display: grid; grid-template-columns: 1fr 1fr; gap: 64px;
    align-items: center; padding: 72px 0; border-bottom: 1px solid var(--border);
  }
  .narrative-item:first-child { padding-top: 0; }
  .narrative-item:last-child { border-bottom: none; padding-bottom: 0; }
  .narrative-item.flip { direction: rtl; }
  .narrative-item.flip > * { direction: ltr; }
  .narrative-frames { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .narrative-frames img {
    aspect-ratio: 3/4; object-fit: cover; filter: grayscale(100%) contrast(1.05);
    transition: filter 0.5s, transform 0.7s var(--ease); cursor: pointer;
  }
  .narrative-frames img:hover { filter: grayscale(60%); transform: scale(1.02); }
  .narrative-frames img:first-child { grid-row: span 2; aspect-ratio: 3/5; }
  .narrative-count { font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--grey-4); margin-bottom: 18px; }
  .narrative-title { font-family: var(--display); font-size: 2rem; font-weight: 300; line-height: 1.1; margin-bottom: 18px; }
  .narrative-desc { font-size: 0.95rem; color: var(--silver); line-height: 1.8; margin-bottom: 20px; }
  .narrative-meta { font-size: 0.6rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--grey-4); }

  .lightbox {
    position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.96);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.4s;
  }
  .lightbox.open { opacity: 1; pointer-events: all; }
  .lightbox img { max-width: 90vw; max-height: 88vh; object-fit: contain; filter: grayscale(100%); }
  .lightbox-close {
    position: absolute; top: 32px; right: 40px;
    font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--grey-4); cursor: pointer; background: none; border: none; font-family: var(--body);
  }
  .lightbox-close:hover { color: var(--white); }
  .lightbox-caption {
    position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
    font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--grey-4);
  }

  @media (max-width: 900px) {
    header { padding: 22px 28px; }
    main { padding: 60px 28px 90px; }
    .narrative-item { grid-template-columns: 1fr; gap: 28px; padding: 56px 0; }
    .narrative-item.flip { direction: ltr; }
  }
</style>
</head>
<body>

<header>
  <a href="index.html" class="back-link">← Back to site</a>
  <span class="header-logo">Yash</span>
</header>

<main>
  <p class="page-eyebrow">Visual Narratives</p>
  <h1 class="page-title">Stories told<em>in sequence.</em></h1>
  <div class="narrative-list" id="fullList"><!-- generated by JS below --></div>
</main>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightboxClose">✕ Close</button>
  <img src="" alt="" id="lightboxImg">
  <div class="lightbox-caption" id="lightboxCaption"></div>
</div>

<script>
/* ────────────────────────────────────────────────────────────
   NOTE FOR YASH: this is the full set of photo essays. It is
   separate from the smaller teaser array on the homepage
   (index.html) — update both if a series should appear in
   both places. Each series has its own `imgs` array; replace
   those with paths into the images/visual-narratives/ folder
   (see the README.txt in there). Add more frames to a series,
   or add a whole new series object, and the page renders it
   automatically.
   ──────────────────────────────────────────────────────────── */
const narrativesFull = [
  {
    title: 'Of Mothers and Salt',
    desc: 'A six-frame study following salt-pan workers through a single dawn — the body as the unit of measure against an unyielding landscape.',
    count: 'Series 01 · 6 frames',
    meta: 'Rajasthan, 2024',
    imgs: [
      'https://images.unsplash.com/photo-1509316975850-ff9c5deb0cd9?w=900&q=80',
      'https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=700&q=80',
      'https://images.unsplash.com/photo-1502086223501-7ea6ecd79368?w=700&q=80',
    ]
  },
  {
    title: 'The Last Tram',
    desc: 'A nocturnal narrative tracing one tram line through a sleeping city — strangers, transit, and the particular loneliness of public light.',
    count: 'Series 02 · 5 frames',
    meta: 'Kolkata, 2023',
    imgs: [
      'https://images.unsplash.com/photo-1485827404703-89b55fcc595e?w=900&q=80',
      'https://images.unsplash.com/photo-1519608487953-e999c86e7455?w=700&q=80',
      'https://images.unsplash.com/photo-1496318447583-f524534e9ce1?w=700&q=80',
    ]
  },
  {
    title: 'Threshold',
    desc: 'A quiet sequence shot at the doorways of a single street, exploring the moment a body crosses from public into private.',
    count: 'Series 03 · 4 frames',
    meta: 'Old Delhi, 2024',
    imgs: [
      'https://images.unsplash.com/photo-1517322048670-4fba75cbbb62?w=900&q=80',
      'https://images.unsplash.com/photo-1532274402911-5a369e4c4bb5?w=700&q=80',
      'https://images.unsplash.com/photo-1465495976277-4387d4b0b4c6?w=700&q=80',
    ]
  },
  {
    title: 'Harvest, Interrupted',
    desc: 'A sequence shot over one unseasonable week in a farming village, where weather and labor renegotiate the same field daily.',
    count: 'Series 04 · 5 frames',
    meta: 'Punjab, 2023',
    imgs: [
      'https://images.unsplash.com/photo-1500651230702-0e2d8a49d4ad?w=900&q=80',
      'https://images.unsplash.com/photo-1500382017468-9049fed747ef?w=700&q=80',
      'https://images.unsplash.com/photo-1492496913980-501348b61469?w=700&q=80',
    ]
  },
];

const list = document.getElementById('fullList');
narrativesFull.forEach((n, i) => {
  const item = document.createElement('div');
  item.className = 'narrative-item' + (i % 2 === 1 ? ' flip' : '');
  const framesHtml = n.imgs.map(src => `<img src="${src}" alt="${n.title}" loading="lazy">`).join('');
  item.innerHTML = `
    <div class="narrative-frames">${framesHtml}</div>
    <div class="narrative-text">
      <div class="narrative-count">${n.count}</div>
      <h3 class="narrative-title">${n.title}</h3>
      <p class="narrative-desc">${n.desc}</p>
      <div class="narrative-meta">${n.meta}</div>
    </div>`;
  item.querySelectorAll('.narrative-frames img').forEach(imgEl => {
    imgEl.addEventListener('click', () => openLightbox(imgEl.src, `${n.title} — ${n.meta}`));
  });
  list.appendChild(item);
});

const lb = document.getElementById('lightbox');
const lbImg = document.getElementById('lightboxImg');
const lbCap = document.getElementById('lightboxCaption');
function openLightbox(src, caption) {
  lbImg.src = src; lbCap.textContent = caption;
  lb.classList.add('open'); document.body.style.overflow = 'hidden';
}
document.getElementById('lightboxClose').addEventListener('click', () => {
  lb.classList.remove('open'); document.body.style.overflow = '';
});
lb.addEventListener('click', e => { if (e.target === lb) { lb.classList.remove('open'); document.body.style.overflow = ''; } });
document.addEventListener('keydown', e => { if (e.key === 'Escape') { lb.classList.remove('open'); document.body.style.overflow = ''; } });
</script>
</body>
</html>
